<div class="video-container">
  <div *ngIf="isLoading" class="loading-spinner">
    <mat-spinner></mat-spinner>
  </div>

  <div *ngIf="!isLoading" class="video-grid">
    <mat-card *ngFor="let video of videos" class="video-card">
      <img mat-card-image [src]="video.image" alt="Video thumbnail" class="thumbnail">
      <mat-card-content>
        <p class="video-author">By {{ video.user.name }}</p>
        <p class="video-duration">{{ video.duration }} sec</p>
      </mat-card-content>
      <mat-card-actions>
        <button mat-button color="primary" [routerLink]="['/video', video.id]">
          <mat-icon>play_circle_filled</mat-icon> Watch
        </button>
      </mat-card-actions>
    </mat-card>
  </div>
</div>
