name: Deploy Backend to Cloud Run

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v1
      with:
        project_id: ${{ secrets.GCP_PROJECT_ID }}
        service_account_key: ${{ secrets.GCP_SA_KEY }}
        export_default_credentials: true
    
    - name: Configure Docker for GCR
      run: gcloud auth configure-docker
    
    - name: Build Docker image
      run: |
        cd backend
        docker build -t gcr.io/${{ secrets.GCP_PROJECT_ID }}/video-backend:latest .
    
    - name: Push Docker image
      run: |
        docker push gcr.io/${{ secrets.GCP_PROJECT_ID }}/video-backend:latest
    
    - name: Deploy to Cloud Run
      run: |
        gcloud run deploy video-backend \
          --image gcr.io/${{ secrets.GCP_PROJECT_ID }}/video-backend:latest \
          --platform managed \
          --region us-central1 \
          --allow-unauthenticated \
          --set-env-vars PEXELS_API_KEY=${{ secrets.PEXELS_API_KEY }} \
          --memory 512Mi \
          --timeout 300 \
          --max-instances 10
    
    - name: Print Backend URL
      run: |
        gcloud run services describe video-backend --region us-central1 --format 'value(status.url)'
