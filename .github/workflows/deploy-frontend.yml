name: Deploy Frontend to Cloud Run

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v1
      with:
        project_id: ${{ secrets.GCP_PROJECT_ID }}
        service_account_key: ${{ secrets.GCP_SA_KEY }}
        export_default_credentials: true
    
    - name: Configure Docker for GCR
      run: gcloud auth configure-docker
    
    - name: Build Docker image
      run: |
        cd frontend
        docker build -t gcr.io/${{ secrets.GCP_PROJECT_ID }}/video-frontend:latest .
    
    - name: Push Docker image
      run: |
        docker push gcr.io/${{ secrets.GCP_PROJECT_ID }}/video-frontend:latest
    
    - name: Deploy to Cloud Run
      run: |
        gcloud run deploy video-frontend \
          --image gcr.io/${{ secrets.GCP_PROJECT_ID }}/video-frontend:latest \
          --platform managed \
          --region us-central1 \
          --allow-unauthenticated \
          --memory 256Mi \
          --timeout 60 \
          --max-instances 10
    
    - name: Print Frontend URL
      run: |
        gcloud run services describe video-frontend --region us-central1 --format 'value(status.url)'
